<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChudX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .habit-item { transition: all 0.2s; }
    .habit-item:hover { background-color: #27272a; }
    .score-bar { transition: width 0.4s ease; }
    .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.875rem; font-weight: 600; border-radius: 9999px; transition: all 0.2s; }
    .calendar-day.has-data { color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,0.1); }
    .page { display: none; }
    .page.active { display: block; }
    .bottom-nav { padding-bottom: env(safe-area-inset-bottom); }
    .nav-item { transition: all 0.2s; }
    .nav-item.active-nav { color: #10b981; }
    .nav-item.active-nav span:first-child { transform: scale(1.1); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">
  <!-- PAGE 1: DAILY -->
  <div id="page-daily" class="page active max-w-md mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold tracking-tighter">CHUDX</h1>
      <div id="streak" class="flex items-center gap-1 bg-zinc-900 px-4 py-1 rounded-full text-sm font-medium">
        🔥 <span id="streak-count">0</span>
      </div>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
      <div class="text-center">
        <div id="date" class="text-zinc-400 text-sm mb-1"></div>
        <div id="grade" class="text-7xl font-black mb-1">F</div>
        <div id="score-detail" class="text-zinc-400 text-sm">0/35 • 0%</div>
      </div>

      <!-- Gymmaxxed Toggle + Volume Input -->
      <div class="mt-6 bg-zinc-800 rounded-2xl p-4">
        <div class="flex items-center justify-between mb-3">
          <span class="text-sm font-medium">Gymmaxxed?</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="gym-toggle" class="sr-only peer">
            <div class="w-14 h-7 bg-zinc-700 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-emerald-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-emerald-500"></div>
          </label>
        </div>
        <div id="volume-input" class="hidden">
          <label class="text-xs text-zinc-400 mb-1 block">Volume today (kg lifted)</label>
          <input type="number" id="gym-volume" placeholder="0" class="w-full bg-zinc-900 text-white px-4 py-3 rounded-2xl text-lg font-mono">
        </div>
      </div>
    </div>

    <!-- BINARY HABITS -->
    <div class="mb-8">
      <h3 class="text-emerald-400 font-medium mb-3 text-sm tracking-widest">BINARY (Y/N)</h3>
      <div id="binary-list" class="space-y-1"></div>
    </div>

    <!-- QUANTITATIVE HABITS -->
    <div>
      <h3 class="text-emerald-400 font-medium mb-3 text-sm tracking-widest">QUANTITATIVE (MEASURED)</h3>
      <div id="quant-list" class="space-y-1"></div>
    </div>
  </div>

  <!-- PAGE 2: CALENDAR -->
  <div id="page-calendar" class="page max-w-md mx-auto p-6">
    <h1 class="text-3xl font-bold tracking-tighter mb-6">Calendar</h1>
    <div class="bg-zinc-900 rounded-3xl p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold" id="calendar-month">March 2026</h2>
      </div>
      <div class="grid grid-cols-7 gap-1 text-center text-xs text-zinc-400 mb-2">
        <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
      </div>
      <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
    </div>
    <div class="mt-6 text-[10px] text-zinc-500 flex flex-wrap gap-x-4 gap-y-1 justify-center">
      <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-yellow-400"></div>S</div>
      <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-emerald-400"></div>A</div>
      <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-cyan-400"></div>B</div>
      <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-blue-400"></div>C</div>
      <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-orange-400"></div>D</div>
      <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-red-500"></div>F</div>
    </div>
  </div>

  <!-- PAGE 3: STATS -->
  <div id="page-stats" class="page max-w-md mx-auto p-6">
    <h1 class="text-3xl font-bold tracking-tighter mb-6">Stats</h1>
    <div class="bg-zinc-900 rounded-3xl p-6 space-y-8">
      <div>
        <div class="text-sm text-zinc-400">Current Streak</div>
        <div id="stats-streak" class="text-5xl font-black text-emerald-400">0 days 🔥</div>
      </div>
      <div>
        <div class="text-sm text-zinc-400">Average Score (last 14 days)</div>
        <div id="stats-average" class="text-5xl font-black">0%</div>
      </div>
      <div>
        <div class="text-sm text-zinc-400 mb-4">Gym Volume Progress (weekly average kg)</div>
        <div id="gym-progress" class="flex gap-2"></div>
      </div>
      <div>
        <div class="text-sm text-zinc-400 mb-3">Recent Days</div>
        <div id="stats-recent" class="space-y-3"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-700 max-w-md mx-auto bottom-nav">
    <div class="flex justify-around items-center px-4 py-2">
      <button onclick="switchPage(0)" class="nav-item flex-1 flex flex-col items-center active-nav">
        <span class="text-3xl mb-1">🏠</span>
        <span class="text-xs font-medium">Daily</span>
      </button>
      <button onclick="switchPage(1)" class="nav-item flex-1 flex flex-col items-center">
        <span class="text-3xl mb-1">📅</span>
        <span class="text-xs font-medium">Calendar</span>
      </button>
      <button onclick="switchPage(2)" class="nav-item flex-1 flex flex-col items-center">
        <span class="text-3xl mb-1">📊</span>
        <span class="text-xs font-medium">Stats</span>
      </button>
    </div>
  </div>

  <script>
    const binaryHabits = [
      { id: 1, text: "Watermaxxing (3–4L)", points: 2 },
      { id: 2, text: "AM Skincaremog", points: 2 },
      { id: 3, text: "Mewing all day", points: 2 },
      { id: 4, text: "Gumchad (chew 20+ min)", points: 2 },
      { id: 5, text: "PM Skincaremog", points: 2 },
      { id: 6, text: "Nofapmaxxing (no gooning)", points: 3 },
      { id: 7, text: "Posturemaxxing", points: 2 },
      { id: 8, text: "Cold Showermaxx", points: 2 }
    ];

    const quantHabits = [
      { id: 9, text: "Sleepmaxxing", unit: "hours", max: 12, points: 3 },
      { id: 10, text: "Sunmaxxing", unit: "min", max: 30, points: 2 },
      { id: 11, text: "10k Stepmaxx", unit: "steps", max: 15000, points: 2 },
      { id: 12, text: "Proteinmaxxing", unit: "g", max: 250, points: 3 },
      { id: 13, text: "5g Creatine", unit: "yes", max: 1, points: 2 },
      { id: 14, text: "No slop", unit: "clean meals", max: 5, points: 2 }
    ];

    let data = JSON.parse(localStorage.getItem('chudxData')) || {};
    const today = new Date().toISOString().split('T')[0];
    const MAX_POINTS = 35;

    function getLetterGrade(points) {
      const percent = (points / MAX_POINTS) * 100;
      if (percent >= 95) return { grade: 'S', color: 'text-yellow-400', bg: '#FACC15' };
      if (percent >= 90) return { grade: 'A+', color: 'text-emerald-400', bg: '#10B981' };
      if (percent >= 85) return { grade: 'A', color: 'text-emerald-400', bg: '#34D399' };
      if (percent >= 80) return { grade: 'A-', color: 'text-emerald-400', bg: '#6EE7B7' };
      if (percent >= 75) return { grade: 'B+', color: 'text-cyan-400', bg: '#22D3EE' };
      if (percent >= 70) return { grade: 'B', color: 'text-cyan-400', bg: '#67E8F9' };
      if (percent >= 65) return { grade: 'B-', color: 'text-cyan-400', bg: '#A5F3FC' };
      if (percent >= 55) return { grade: 'C', color: 'text-blue-400', bg: '#60A5FA' };
      if (percent >= 45) return { grade: 'D', color: 'text-orange-400', bg: '#FB923C' };
      return { grade: 'F', color: 'text-red-500', bg: '#EF4444' };
    }

    function calculateScore(dayData) {
      if (!dayData) return 0;
      let score = 0;
      binaryHabits.forEach(h => { if (dayData.binary && dayData.binary[h.id]) score += h.points; });
      quantHabits.forEach(h => {
        if (dayData.quant && dayData.quant[h.id] !== undefined) {
          const value = parseFloat(dayData.quant[h.id]) || 0;
          score += Math.round(h.points * Math.min(value / h.max, 1));
        }
      });
      if (dayData.gym) score += 3;
      return score;
    }

    function renderBinary() {
      const container = document.getElementById('binary-list');
      container.innerHTML = '';
      binaryHabits.forEach(h => {
        const checked = data[today] && data[today].binary && data[today].binary[h.id];
        const div = document.createElement('div');
        div.className = 'habit-item flex items-center gap-3 bg-zinc-900 px-5 py-4 rounded-2xl';
        div.innerHTML = `<input type="checkbox" id="b${h.id}" ${checked ? 'checked' : ''} class="w-5 h-5 accent-emerald-400"><label for="b${h.id}" class="flex-1 text-[15px] cursor-pointer">${h.text}</label>`;
        container.appendChild(div);
        div.querySelector('input').addEventListener('change', e => {
          if (!data[today]) data[today] = { binary: {}, quant: {}, gym: false, gymVolume: 0 };
          data[today].binary[h.id] = e.target.checked;
          saveData(); updateScore();
        });
      });
    }

    function renderQuant() {
      const container = document.getElementById('quant-list');
      container.innerHTML = '';
      quantHabits.forEach(h => {
        const value = data[today] && data[today].quant && data[today].quant[h.id] !== undefined ? data[today].quant[h.id] : 0;
        const div = document.createElement('div');
        div.className = 'habit-item flex items-center gap-3 bg-zinc-900 px-5 py-4 rounded-2xl';
        div.innerHTML = `<label class="flex-1 text-[15px]">${h.text}</label><input type="number" id="q${h.id}" value="${value}" min="0" max="${h.max}" class="w-20 bg-zinc-800 text-white text-right px-3 py-1 rounded-xl font-mono"><span class="text-xs text-zinc-400">${h.unit}</span>`;
        container.appendChild(div);
        div.querySelector('input').addEventListener('input', e => {
          if (!data[today]) data[today] = { binary: {}, quant: {}, gym: false, gymVolume: 0 };
          data[today].quant[h.id] = parseFloat(e.target.value) || 0;
          saveData(); updateScore();
        });
      });
    }

    function updateScore() {
      const dayData = data[today] || {};
      const score = calculateScore(dayData);
      const gradeInfo = getLetterGrade(score);
      document.getElementById('grade').textContent = gradeInfo.grade;
      document.getElementById('grade').className = `text-7xl font-black mb-1 ${gradeInfo.color}`;
      document.getElementById('score-detail').textContent = `${score}/${MAX_POINTS} • ${Math.round((score/MAX_POINTS)*100)}%`;
      document.getElementById('progress').style.width = `${(score/MAX_POINTS)*100}%`;
      updateStreak();
    }

    function updateStreak() {
      let streak = 0;
      let date = new Date(today);
      while (true) {
        const dateStr = date.toISOString().split('T')[0];
        const dayData = data[dateStr];
        if (dayData && calculateScore(dayData) >= 24) { streak++; date.setDate(date.getDate() - 1); } else break;
      }
      document.getElementById('streak-count').textContent = streak;
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
      const currentDate = new Date(); const year = currentDate.getFullYear(); const month = currentDate.getMonth();
      document.getElementById('calendar-month').textContent = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const dayData = data[dateStr]; const score = dayData ? calculateScore(dayData) : 0;
        const gradeInfo = score > 0 ? getLetterGrade(score) : null;
        const dayEl = document.createElement('div');
        dayEl.className = `calendar-day text-zinc-300 ${score > 0 ? 'has-data' : ''}`;
        if (score > 0) dayEl.style.backgroundColor = gradeInfo.bg;
        dayEl.textContent = day;
        grid.appendChild(dayEl);
      }
    }

    function renderStats() {
      const streakEl = document.getElementById('stats-streak');
      streakEl.textContent = document.getElementById('streak-count').textContent + ' days 🔥';

      const recent = Object.keys(data).sort().reverse().slice(0,7);
      const container = document.getElementById('stats-recent');
      container.innerHTML = recent.map(date => {
        const score = calculateScore(data[date]);
        const grade = getLetterGrade(score);
        return `<div class="flex justify-between bg-zinc-800 px-4 py-3 rounded-2xl"><span>${date}</span><span class="${grade.color} font-bold">${grade.grade} (${score})</span></div>`;
      }).join('');

      // Gym Volume Weekly Progress (simple bars)
      const progressContainer = document.getElementById('gym-progress');
      progressContainer.innerHTML = '';
      const weeks = [7,14,21,28]; // last 4 weeks
      weeks.forEach(days => {
        const weekData = Object.keys(data).filter(d => {
          const diff = Math.floor((new Date(today) - new Date(d)) / (1000*60*60*24));
          return diff >= days-7 && diff < days;
        });
        let total = 0, count = 0;
        weekData.forEach(d => { if (data[d].gymVolume) { total += data[d].gymVolume; count++; } });
        const avg = count ? Math.round(total / count) : 0;
        const barHTML = `<div class="flex-1 text-center"><div class="text-[10px] text-zinc-400">Wk ${Math.round(days/7)}</div><div class="h-24 bg-zinc-800 rounded-2xl flex items-end p-1"><div class="w-full bg-emerald-400 rounded-xl" style="height: ${Math.min(avg/10,100)}%"></div></div><div class="text-xs font-mono mt-1">${avg}kg</div></div>`;
        progressContainer.innerHTML += barHTML;
      });
    }

    function switchPage(pageIndex) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(['page-daily','page-calendar','page-stats'][pageIndex]).classList.add('active');
      document.querySelectorAll('.nav-item').forEach((btn, i) => btn.classList.toggle('active-nav', i === pageIndex));
      if (pageIndex === 1) renderCalendar();
      if (pageIndex === 2) renderStats();
    }

    function saveData() { localStorage.setItem('chudxData', JSON.stringify(data)); }

    function init() {
      document.getElementById('date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      if (!data[today]) data[today] = { binary: {}, quant: {}, gym: false, gymVolume: 0 };

      renderBinary();
      renderQuant();
      updateScore();

      // Gym toggle + volume
      const toggle = document.getElementById('gym-toggle');
      const volumeBox = document.getElementById('volume-input');
      const volumeInput = document.getElementById('gym-volume');
      toggle.checked = data[today].gym || false;
      if (toggle.checked) volumeBox.classList.remove('hidden');
      volumeInput.value = data[today].gymVolume || 0;

      toggle.addEventListener('change', () => {
        data[today].gym = toggle.checked;
        if (toggle.checked) volumeBox.classList.remove('hidden'); else volumeBox.classList.add('hidden');
        saveData(); updateScore();
      });
      volumeInput.addEventListener('input', () => {
        data[today].gymVolume = parseFloat(volumeInput.value) || 0;
        saveData(); updateScore();
      });

      switchPage(0);
    }

    init();
  </script>
</body>
</html>
