      transition: all 0.2s;

    .calendar-day.has-data {
      color: #fff;

    }
    .page { display: none; }
    .page.active { display: block; }
    .nav-item { transition: all 0.2s; }
  </style>
</head>

      <div id="streak" class="flex items-center gap-1 bg-zinc-900 px-4 py-1 rounded-full text-sm font-medium">

      </div>
    </div>

    <div id="habits-list" class="space-y-8"></div>

    <div class="mt-10">
      <label class="block text-sm text-zinc-400 mb-2">Daily notes (optional)</label>
      <textarea id="notes" rows="3" class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl p-4 text-sm resize-none focus:outline-none focus:border-emerald-400" placeholder="How did you feel?"></textarea>
    </div>
  </div>

  <!-- PAGE 2: CALENDAR -->
  <div id="page-calendar" class="page max-w-md mx-auto p-6">
    <h1 class="text-3xl font-bold tracking-tighter mb-6">Calendar</h1>
    <div class="bg-zinc-900 rounded-3xl p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold" id="calendar-month">March 2026</h2>
      </div>
      <div class="grid grid-cols-7 gap-1 text-center text-xs text-zinc-400 mb-2">
        <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
      </div>
      <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
    </div>
    <div class="mt-6 text-[10px] text-zinc-500 flex flex-wrap gap-x-4 gap-y-1 justify-center">
      <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-yellow-400"></div>S</div>
      <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-emerald-400"></div>A</div>
      <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-cyan-400"></div>B</div>
      <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-blue-400"></div>C</div>
      <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-orange-400"></div>D</div>
      <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-red-500"></div>F</div>
    </div>
  </div>

  <!-- PAGE 3: STATS -->
  <div id="page-stats" class="page max-w-md mx-auto p-6">
    <h1 class="text-3xl font-bold tracking-tighter mb-6">Stats</h1>
    <div class="bg-zinc-900 rounded-3xl p-6 space-y-6">
      <div>
        <div class="text-sm text-zinc-400">Current Streak</div>
        <div id="stats-streak" class="text-5xl font-black text-emerald-400">0 days 🔥</div>
      </div>
      <div>
        <div class="text-sm text-zinc-400">Average Score (last 14 days)</div>
        <div id="stats-average" class="text-5xl font-black">0%</div>
      </div>
      <div>
        <div class="text-sm text-zinc-400 mb-3">Recent Days</div>
        <div id="stats-recent" class="space-y-3"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 max-w-md mx-auto">
    <div class="flex text-xs font-medium">

        🏠<br>Daily

      </button>

    </div>
  </div>
