<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChudX</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .habit-item { transition: all 0.2s; }
    .habit-item:hover { background-color: #27272a; }
    .score-bar { transition: width 0.4s ease; }
    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 9999px;
      transition: all 0.2s;
    }
    .calendar-day.has-data {
      color: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.1);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">
  <div class="max-w-md mx-auto p-6">
    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold tracking-tighter">CHUDX</h1>
      <div id="streak" class="flex items-center gap-1 bg-zinc-900 px-4 py-1 rounded-full text-sm font-medium">
        🔥 <span id="streak-count">0</span>
      </div>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
      <div class="text-center">
        <div id="date" class="text-zinc-400 text-sm mb-1"></div>
        <div id="grade" class="text-7xl font-black mb-1">F</div>
        <div id="score-detail" class="text-zinc-400 text-sm">0/35 • 0%</div>
      </div>

      <!-- Gymmaxxed? Toggle -->
      <div class="mt-6 flex items-center justify-center gap-4 bg-zinc-800 rounded-2xl p-4">
        <span class="text-sm font-medium">Gymmaxxed?</span>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" id="strength-toggle" class="sr-only peer">
          <div class="w-14 h-7 bg-zinc-700 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-emerald-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-emerald-500"></div>
        </label>
      </div>

      <!-- Progress bar -->
      <div class="h-2 bg-zinc-800 rounded-full mt-6 overflow-hidden">
        <div id="progress" class="h-2 bg-emerald-400 score-bar w-0"></div>
      </div>
    </div>

    <!-- HABITS LIST (this is the part that was missing) -->
    <div id="habits-list" class="space-y-8"></div>

    <!-- NOTES -->
    <div class="mt-10">
      <label class="block text-sm text-zinc-400 mb-2">Daily notes (optional)</label>
      <textarea id="notes" rows="3" class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl p-4 text-sm resize-none focus:outline-none focus:border-emerald-400" placeholder="How did you feel?"></textarea>
    </div>

    <!-- HISTORY BUTTON -->
    <button onclick="toggleHistory()" class="mt-8 w-full bg-zinc-800 hover:bg-zinc-700 transition py-4 rounded-2xl font-medium text-sm tracking-widest">
      VIEW CALENDAR
    </button>

    <!-- HISTORY MODAL -->
    <div id="history-modal" class="hidden fixed inset-0 bg-black/80 flex items-end">
      <div class="bg-zinc-900 w-full max-h-[85vh] overflow-auto rounded-t-3xl p-6">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-bold" id="calendar-month">March 2026</h2>
          <button onclick="toggleHistory()" class="text-emerald-400">Close</button>
        </div>
        <div class="grid grid-cols-7 gap-1 text-center text-xs text-zinc-400 mb-2">
          <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
        </div>
        <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
        <div class="mt-6 text-[10px] text-zinc-500 flex flex-wrap gap-x-4 gap-y-1 justify-center">
          <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-yellow-400"></div>S</div>
          <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-emerald-400"></div>A</div>
          <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-cyan-400"></div>B</div>
          <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-blue-400"></div>C</div>
          <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-orange-400"></div>D</div>
          <div class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-red-500"></div>F</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const habits = [
      { id: 1, category: "Morning", text: "Sleepmaxxing (8+ hours consistent)", points: 3 },
      { id: 2, category: "Morning", text: "Sunmaxxing (10–15 min sunlight)", points: 2 },
      { id: 3, category: "Morning", text: "Watermaxxing (3–4L)", points: 2 },
      { id: 4, category: "Morning", text: "AM Skincaremog", points: 2 },
      { id: 5, category: "Fitness", text: "10k Stepmaxx", points: 2 },
      { id: 6, category: "Fitness", text: "Posturemaxxing", points: 2 },
      { id: 7, category: "Fitness", text: "Cold Showermaxx", points: 2 },
      { id: 8, category: "Nutrition", text: "Proteinmaxxing", points: 3 },
      { id: 9, category: "Nutrition", text: "5g Creatine", points: 2 },
      { id: 10, category: "Nutrition", text: "No slop", points: 2 },
      { id: 11, category: "Face", text: "Mewing all day", points: 2 },
      { id: 12, category: "Face", text: "Nosebreathingmaxx", points: 1 },
      { id: 13, category: "Face", text: "Gumchad (chew 20+ min)", points: 2 },
      { id: 14, category: "Grooming", text: "PM Skincaremog", points: 2 },
      { id: 15, category: "Discipline", text: "Nofapmaxxing (no gooning)", points: 3 }
    ];

    let data = JSON.parse(localStorage.getItem('chudxData')) || {};
    const today = new Date().toISOString().split('T')[0];
    const MAX_POINTS = 35;

    function getLetterGrade(points) {
      const percent = (points / MAX_POINTS) * 100;
      if (percent >= 95) return { grade: 'S', color: 'text-yellow-400', bg: '#FACC15' };
      if (percent >= 90) return { grade: 'A+', color: 'text-emerald-400', bg: '#10B981' };
      if (percent >= 85) return { grade: 'A', color: 'text-emerald-400', bg: '#34D399' };
      if (percent >= 80) return { grade: 'A-', color: 'text-emerald-400', bg: '#6EE7B7' };
      if (percent >= 75) return { grade: 'B+', color: 'text-cyan-400', bg: '#22D3EE' };
      if (percent >= 70) return { grade: 'B', color: 'text-cyan-400', bg: '#67E8F9' };
      if (percent >= 65) return { grade: 'B-', color: 'text-cyan-400', bg: '#A5F3FC' };
      if (percent >= 55) return { grade: 'C', color: 'text-blue-400', bg: '#60A5FA' };
      if (percent >= 45) return { grade: 'D', color: 'text-orange-400', bg: '#FB923C' };
      return { grade: 'F', color: 'text-red-500', bg: '#EF4444' };
    }

    function calculateScore(dayData) {
      if (!dayData) return 0;
      let score = 0;
      if (dayData.habits) {
        Object.keys(dayData.habits).forEach(id => {
          if (dayData.habits[id]) {
            const habit = habits.find(h => h.id === parseInt(id));
            if (habit) score += habit.points;
          }
        });
      }
      if (dayData.strength) score += 3;
      return score;
    }

    function renderHabits() {
      const container = document.getElementById('habits-list');
      container.innerHTML = '';

      const grouped = {};
      habits.forEach(h => {
        if (!grouped[h.category]) grouped[h.category] = [];
        grouped[h.category].push(h);
      });

      Object.keys(grouped).forEach(cat => {
        const section = document.createElement('div');
        section.innerHTML = `<h3 class="text-emerald-400 font-medium mb-3 text-sm tracking-widest">${cat.toUpperCase()}</h3><div class="space-y-1"></div>`;
        const habitDiv = section.querySelector('div');

        grouped[cat].forEach(h => {
          const checked = data[today] && data[today].habits && data[today].habits[h.id] ? true : false;
          const div = document.createElement('div');
          div.className = 'habit-item flex items-center gap-3 bg-zinc-900 px-5 py-4 rounded-2xl';
          div.innerHTML = `
            <input type="checkbox" id="h${h.id}" ${checked ? 'checked' : ''} class="w-5 h-5 accent-emerald-400">
            <label for="h${h.id}" class="flex-1 text-[15px] cursor-pointer">${h.text}</label>
          `;
          habitDiv.appendChild(div);

          div.querySelector('input').addEventListener('change', (e) => {
            if (!data[today]) data[today] = { habits: {}, notes: '', strength: false };
            data[today].habits[h.id] = e.target.checked;
            saveData();
            updateScore();
          });
        });
        container.appendChild(section);
      });
    }

    function updateScore() {
      const dayData = data[today] || {};
      const score = calculateScore(dayData);
      const gradeInfo = getLetterGrade(score);

      document.getElementById('grade').textContent = gradeInfo.grade;
      document.getElementById('grade').className = `text-7xl font-black mb-1 ${gradeInfo.color}`;
      document.getElementById('score-detail').textContent = `${score}/${MAX_POINTS} • ${Math.round((score/MAX_POINTS)*100)}%`;
      document.getElementById('progress').style.width = `${(score/MAX_POINTS)*100}%`;

      updateStreak();
    }

    function updateStreak() {
      let streak = 0;
      let date = new Date(today);
      while (true) {
        const dateStr = date.toISOString().split('T')[0];
        const dayData = data[dateStr];
        if (dayData && calculateScore(dayData) >= 24) {
          streak++;
          date.setDate(date.getDate() - 1);
        } else break;
      }
      document.getElementById('streak-count').textContent = streak;
    }

    function renderCalendar() {
      const grid = document.getElementById('calendar-grid');
      grid.innerHTML = '';
      const currentDate = new Date();
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      document.getElementById('calendar-month').textContent = currentDate.toLocaleString('default', { month: 'long', year: 'numeric' });

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        grid.appendChild(empty);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const dayData = data[dateStr];
        const score = dayData ? calculateScore(dayData) : 0;
        const gradeInfo = score > 0 ? getLetterGrade(score) : null;

        const dayEl = document.createElement('div');
        dayEl.className = `calendar-day text-zinc-300 ${score > 0 ? 'has-data' : ''}`;
        if (score > 0) dayEl.style.backgroundColor = gradeInfo.bg;
        dayEl.textContent = day;
        grid.appendChild(dayEl);
      }
    }

    function toggleHistory() {
      const modal = document.getElementById('history-modal');
      modal.classList.toggle('hidden');
      if (!modal.classList.contains('hidden')) renderCalendar();
    }

    function saveData() {
      localStorage.setItem('chudxData', JSON.stringify(data));
    }

    function loadNotes() {
      const notesEl = document.getElementById('notes');
      if (data[today] && data[today].notes) notesEl.value = data[today].notes;
      notesEl.addEventListener('input', () => {
        if (!data[today]) data[today] = { habits: {}, notes: '', strength: false };
        data[today].notes = notesEl.value;
        saveData();
      });
    }

    function init() {
      document.getElementById('date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      if (!data[today]) data[today] = { habits: {}, notes: '', strength: false };

      renderHabits();
      updateScore();
      loadNotes();

      const strengthToggle = document.getElementById('strength-toggle');
      strengthToggle.checked = data[today].strength || false;
      strengthToggle.addEventListener('change', () => {
        data[today].strength = strengthToggle.checked;
        saveData();
        updateScore();
      });
    }

    init();
  </script>
</body>
</html>
