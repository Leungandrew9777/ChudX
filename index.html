<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Looksmaxx Daily</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .habit-item { transition: all 0.2s; }
    .habit-item:hover { background-color: #27272a; }
    .score-bar { transition: width 0.4s ease; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">
  <div class="max-w-md mx-auto p-6">
    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold tracking-tighter">looksmaxx daily</h1>
      <div id="streak" class="flex items-center gap-1 bg-zinc-900 px-4 py-1 rounded-full text-sm font-medium">
        🔥 <span id="streak-count">0</span>
      </div>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-6 mb-8">
      <div class="text-center">
        <div id="date" class="text-zinc-400 text-sm mb-1"></div>
        <div class="text-6xl font-bold mb-1" id="score">0</div>
        <div class="text-2xl text-emerald-400 font-medium" id="percent">0%</div>
      </div>
      
      <!-- Progress bar -->
      <div class="h-2 bg-zinc-800 rounded-full mt-6 overflow-hidden">
        <div id="progress" class="h-2 bg-emerald-400 score-bar w-0"></div>
      </div>
    </div>

    <!-- HABITS -->
    <div id="habits-list" class="space-y-8"></div>

    <!-- NOTES -->
    <div class="mt-10">
      <label class="block text-sm text-zinc-400 mb-2">Daily notes (optional)</label>
      <textarea id="notes" rows="3" 
                class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl p-4 text-sm resize-none focus:outline-none focus:border-emerald-400"
                placeholder="How did you feel? Any wins?"></textarea>
    </div>

    <!-- HISTORY BUTTON -->
    <button onclick="toggleHistory()" 
            class="mt-8 w-full bg-zinc-800 hover:bg-zinc-700 transition py-4 rounded-2xl font-medium text-sm tracking-widest">
      VIEW HISTORY (last 14 days)
    </button>

    <!-- HISTORY MODAL -->
    <div id="history-modal" class="hidden fixed inset-0 bg-black/80 flex items-end">
      <div class="bg-zinc-900 w-full max-h-[80vh] overflow-auto rounded-t-3xl p-6">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-bold">History</h2>
          <button onclick="toggleHistory()" class="text-emerald-400">Close</button>
        </div>
        <div id="history-list" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script>
    // ==================== YOUR 20 HABITS ====================
    const habits = [
      { id: 1, category: "Morning", text: "Sleep 8+ hours (consistent schedule)", points: 2 },
      { id: 2, category: "Morning", text: "Morning sunlight 10–15 min", points: 1 },
      { id: 3, category: "Morning", text: "Drink 3–4L water", points: 2 },
      { id: 4, category: "Morning", text: "AM skincare (cleanse + moisturize + SPF)", points: 2 },
      { id: 5, category: "Fitness", text: "10,000+ steps", points: 2 },
      { id: 6, category: "Fitness", text: "Strength workout completed", points: 2 },
      { id: 7, category: "Fitness", text: "Good posture (no slouching)", points: 1 },
      { id: 8, category: "Fitness", text: "Cold shower", points: 1 },
      { id: 9, category: "Nutrition", text: "Hit protein goal", points: 2 },
      { id: 10, category: "Nutrition", text: "Take 5g creatine", points: 1 },
      { id: 11, category: "Nutrition", text: "Eat clean (no junk)", points: 1 },
      { id: 12, category: "Face", text: "Mewing all day", points: 1 },
      { id: 13, category: "Face", text: "Nasal breathing only", points: 1 },
      { id: 14, category: "Face", text: "Chew gum/tough food 20+ min", points: 1 },
      { id: 15, category: "Grooming", text: "Teeth: brush 2x + floss + tongue scrape", points: 1 },
      { id: 16, category: "Grooming", text: "Shower + deodorant", points: 1 },
      { id: 17, category: "Grooming", text: "Hair styled neatly", points: 1 },
      { id: 18, category: "Grooming", text: "Nails trimmed & clean", points: 1 },
      { id: 19, category: "Grooming", text: "Eyebrows + facial hair groomed", points: 1 },
      { id: 20, category: "Grooming", text: "PM skincare routine", points: 2 }
    ];

    let data = JSON.parse(localStorage.getItem('looksmaxxData')) || {};
    const today = new Date().toISOString().split('T')[0];

    // ==================== RENDER HABITS ====================
    function renderHabits() {
      const container = document.getElementById('habits-list');
      container.innerHTML = '';

      const grouped = {};
      habits.forEach(h => {
        if (!grouped[h.category]) grouped[h.category] = [];
        grouped[h.category].push(h);
      });

      Object.keys(grouped).forEach(cat => {
        const section = document.createElement('div');
        section.innerHTML = `
          <h3 class="text-emerald-400 font-medium mb-3 text-sm tracking-widest">${cat.toUpperCase()}</h3>
          <div class="space-y-1"></div>
        `;
        const habitDiv = section.querySelector('div');

        grouped[cat].forEach(h => {
          const checked = data[today] && data[today].habits && data[today].habits[h.id] ? true : false;
          const div = document.createElement('div');
          div.className = 'habit-item flex items-center gap-3 bg-zinc-900 px-5 py-4 rounded-2xl';
          div.innerHTML = `
            <input type="checkbox" id="h${h.id}" ${checked ? 'checked' : ''} 
                   class="w-5 h-5 accent-emerald-400">
            <label for="h${h.id}" class="flex-1 text-[15px] cursor-pointer">${h.text}</label>
            <span class="text-xs bg-zinc-800 px-2.5 py-1 rounded-xl text-zinc-400">${h.points}</span>
          `;
          habitDiv.appendChild(div);

          // Live update on check
          div.querySelector('input').addEventListener('change', (e) => {
            if (!data[today]) data[today] = { habits: {}, notes: '' };
            data[today].habits[h.id] = e.target.checked;
            saveData();
            updateScore();
          });
        });

        container.appendChild(section);
      });
    }

    // ==================== SCORE CALCULATION ====================
    function calculateScore(dayData) {
      if (!dayData || !dayData.habits) return 0;
      let score = 0;
      Object.keys(dayData.habits).forEach(id => {
        if (dayData.habits[id]) {
          const habit = habits.find(h => h.id === parseInt(id));
          if (habit) score += habit.points;
        }
      });
      return score;
    }

    function updateScore() {
      const dayData = data[today] || {};
      const score = calculateScore(dayData);
      const maxPoints = 28; // total possible points
      const percent = Math.round((score / maxPoints) * 100);

      document.getElementById('score').textContent = score;
      document.getElementById('percent').textContent = percent + '%';
      document.getElementById('progress').style.width = percent + '%';

      // Update streak
      updateStreak();
    }

    // ==================== STREAK ====================
    function updateStreak() {
      let streak = 0;
      let date = new Date(today);

      while (true) {
        const dateStr = date.toISOString().split('T')[0];
        const dayData = data[dateStr];
        if (dayData && calculateScore(dayData) >= 18) { // ≥65% ≈ good day
          streak++;
          date.setDate(date.getDate() - 1);
        } else {
          break;
        }
      }

      document.getElementById('streak-count').textContent = streak;
    }

    // ==================== HISTORY ====================
    function renderHistory() {
      const list = document.getElementById('history-list');
      list.innerHTML = '';

      const sortedDates = Object.keys(data).sort().reverse().slice(0, 14);

      sortedDates.forEach(dateStr => {
        const dayData = data[dateStr];
        const score = calculateScore(dayData);
        const percent = Math.round((score / 28) * 100);

        const div = document.createElement('div');
        div.className = 'flex items-center justify-between bg-zinc-800 px-5 py-4 rounded-2xl';
        div.innerHTML = `
          <div>
            <div class="font-medium">${new Date(dateStr).toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'})}</div>
            <div class="text-xs text-zinc-400">${score} pts</div>
          </div>
          <div class="text-right">
            <div class="text-emerald-400 font-bold text-xl">${percent}%</div>
            <div class="h-1.5 w-16 bg-zinc-700 rounded-full mt-1 overflow-hidden">
              <div class="h-1.5 bg-emerald-400" style="width: ${percent}%"></div>
            </div>
          </div>
        `;
        list.appendChild(div);
      });

      if (sortedDates.length === 0) {
        list.innerHTML = `<p class="text-zinc-400 text-center py-8">No history yet — start tracking today!</p>`;
      }
    }

    function toggleHistory() {
      const modal = document.getElementById('history-modal');
      modal.classList.toggle('hidden');
      if (!modal.classList.contains('hidden')) renderHistory();
    }

    // ==================== SAVE & LOAD ====================
    function saveData() {
      localStorage.setItem('looksmaxxData', JSON.stringify(data));
    }

    // Load notes
    function loadNotes() {
      const notesEl = document.getElementById('notes');
      if (data[today] && data[today].notes) notesEl.value = data[today].notes;

      notesEl.addEventListener('input', () => {
        if (!data[today]) data[today] = { habits: {}, notes: '' };
        data[today].notes = notesEl.value;
        saveData();
      });
    }

    // ==================== INIT ====================
    function init() {
      document.getElementById('date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      
      if (!data[today]) data[today] = { habits: {}, notes: '' };
      
      renderHabits();
      updateScore();
      loadNotes();
      updateStreak();
    }

    init();
  </script>
</body>
</html>
